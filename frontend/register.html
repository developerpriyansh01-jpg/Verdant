<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant – Sign Up</title>
    <!-- Style Sheets -->
    <link rel="stylesheet" href="verdant.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.15) 0%, rgba(34, 197, 94, 0.05) 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-main);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .auth-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .auth-header i {
            font-size: 38px;
            color: var(--primary);
        }

        .auth-header h2 {
            font-size: 24px;
            color: var(--primary-dark);
            font-weight: 700;
        }
        body.dark .auth-header h2 { color: #fff; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-control-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control-wrap i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-control-wrap input, .form-control-wrap textarea {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-main);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-control-wrap textarea {
            padding: 10px 14px;
            height: 80px;
            resize: none;
        }

        .form-control-wrap input:focus, .form-control-wrap textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(22, 163, 74, 0.12);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            margin-top: 5px;
            grid-column: span 2;
        }

        .auth-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media(max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <!-- Floating Theme Switcher -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button class="btn btn-outline" id="themeBtn" style="padding: 10px 15px; border-radius: 50%;"><i class="fa-solid fa-moon"></i></button>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="auth-header">
                <i class="fa-solid fa-seedling"></i>
                <h2>Create Profile</h2>
                <p style="color:var(--text-muted); font-size:13px;">Join Verdant to catalog diagnostics and save plants details.</p>
            </div>

            <div class="form-grid">
                <!-- First Name -->
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-address-card"></i>
                        <input type="text" id="firstName" placeholder="First Name">
                    </div>
                </div>

                <!-- Last Name -->
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-address-card"></i>
                        <input type="text" id="lastName" placeholder="Last Name">
                    </div>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username *</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-user-tag"></i>
                        <input type="text" id="username" placeholder="Username (Unique)">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="example@mail.com">
                    </div>
                </div>

                <!-- Mobile -->
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="mobile" placeholder="Mobile Number">
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password *</label>
                    <div class="form-control-wrap">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Create Password">
                    </div>
                </div>

                <!-- Bio -->
                <div class="form-group full-width">
                    <label for="bio">Bio</label>
                    <div class="form-control-wrap">
                        <textarea id="bio" placeholder="Describe your gardening interests..."></textarea>
                    </div>
                </div>

                <button class="btn auth-btn" id="registerBtn"><i class="fa-solid fa-user-plus"></i> Sign Up</button>
            </div>

            <div class="auth-footer">
                Already registered? <a href="login.html">Sign In Here</a>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="verdant.js"></script>
    <script>
        const firstNameInput = document.getElementById("firstName");
        const lastNameInput = document.getElementById("lastName");
        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const mobileInput = document.getElementById("mobile");
        const passwordInput = document.getElementById("password");
        const bioInput = document.getElementById("bio");
        const registerBtn = document.getElementById("registerBtn");

        registerBtn.addEventListener("click", async () => {
            const first = firstNameInput.value.trim();
            const last = lastNameInput.value.trim();
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const mobile = mobileInput.value.trim();
            const password = passwordInput.value;
            const bio = bioInput.value.trim();

            // Client side validations
            if (!username) {
                showToast("Username is required", "error");
                usernameInput.focus();
                return;
            }

            if (username.length < 3) {
                showToast("Username must be at least 3 characters", "error");
                usernameInput.focus();
                return;
            }

            if (!email) {
                showToast("Email address is required", "error");
                emailInput.focus();
                return;
            }

            // Simple email regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast("Please enter a valid email address", "error");
                emailInput.focus();
                return;
            }

            if (!password) {
                showToast("Password is required", "error");
                passwordInput.focus();
                return;
            }

            if (password.length < 6) {
                showToast("Password must be at least 6 characters", "error");
                passwordInput.focus();
                return;
            }

            // Disable button & loading feedback
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering...';

            try {
                const res = await fetch("http://localhost:5001/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        first_name: first,
                        last_name: last,
                        username: username,
                        email: email,
                        mobile: mobile,
                        password: password,
                        bio: bio
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || "Registration failed.");
                }

                showToast("Profile created successfully! Redirecting to login...", "success");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1500);
            } catch (err) {
                console.error(err);
                showToast(err.message, "error");
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Sign Up';
            }
        });
    </script>
</body>
</html>
